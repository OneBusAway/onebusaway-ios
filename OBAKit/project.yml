targets:
  OBAKit:
    type: framework
    platform: iOS
    sources: ["."]
    dependencies:
      - target: OBAKitCore
      - package: BLTNBoard
      - package: Hyperconnectivity
      - package: Eureka
      - package: FloatingPanel
      - package: MarqueeLabel
      - package: OTPKit
      - sdk: HealthKit.framework
    postBuildScripts:
      - path: "../scripts/swiftlint.sh"
        name: Swiftlint
        basedOnDependencyAnalysis: false
    scheme:
      gatherCoverageData: true
    info:
      path: "Info.plist"
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: false
        # Swift 6 migration Phase 2 (docs/swift6-migration-plan.md): UIKit-heavy
        # framework, so unannotated code defaults to the main actor. Approachable
        # concurrency stays on permanently (two of its features are not part of
        # the Swift 6 language mode).
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_VERSION: "6.0"
      configs:
          Debug:
            LD_RUNPATH_SEARCH_PATHS:
              - "$(inherited)"
              - "@executable_path/Frameworks"
          Release:
            LD_RUNPATH_SEARCH_PATHS:
              - "$(inherited)"
              - "@executable_path/Frameworks"
