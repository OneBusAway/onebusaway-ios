name: OBAKit

############
# Options
############

settings:
  base:
    MARKETING_VERSION: 26.2.2
    # Swift 6 migration Phases 3–4 (docs/swift6-migration-plan.md): the whole
    # project builds in the Swift 6 language mode with main-actor default
    # isolation. OBAKitCore pins SWIFT_DEFAULT_ACTOR_ISOLATION back to
    # nonisolated in its own project.yml — it owns actors and background
    # decode. Approachable concurrency stays on permanently (two of its five
    # features are not part of the Swift 6 language mode).
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_VERSION: "6.0"

options:
  minimumXcodeGenVersion: 2.42
  generateEmptyDirectories: true
  groupSortPosition: top
  deploymentTarget:
    iOS: "18.0"

############
# App
############

targets:
  App:
    type: application
    platform: iOS
    dependencies:
      - target: OBAKitCore
      - target: OBAKit
      - target: OBAWidget
    info:
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleLocalizations:
          - ar
          - en
          - es
          - fil
          - fr
          - it
          - ko
          - pl
          - pt-BR
          - ru
          - vi
          - zh-Hans
          - zh-Hant
        ITSAppUsesNonExemptEncryption: false
        LSApplicationQueriesSchemes:
          - fb
          - twitter
          - comgooglemaps
        NSLocationWhenInUseUsageDescription: See where you are in relation to transit, and help you navigate more easily.
        # HealthKit purpose strings live in Apps/Shared/info_plist.yml (shared by every app).
        NSLocationTemporaryUsageDescriptionDictionary:
          MapStatusView: See where you are in relation to transit, and help you navigate more easily.
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: SceneDelegate
    preBuildScripts:
      - name: Versioning
        script: "${PROJECT_DIR}/scripts/version"
        runOnlyWhenInstalling: true         # For SwiftUI Xcode Previews.
    scheme:
      gatherCoverageData: true
      testTargets:
        - name: OBAKitTests
          parallelizable: false
          randomExecutionOrder: true
    settings:
      base:
        CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: true
        CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: false
        OTHER_LDFLAGS: -ObjC
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
    BLTNBoard:
        url: https://github.com/alexaubry/BulletinBoard.git
        exactVersion: 5.0.0
    Eureka:
        url: https://github.com/xmartlabs/Eureka.git
        exactVersion: 5.5.0
    FloatingPanel:
        url: https://github.com/SCENEE/FloatingPanel.git
        exactVersion: 3.0.1
    GRDB:
        url: https://github.com/groue/GRDB.swift.git
        minorVersion: 6.29.0
    Hyperconnectivity:
        url: https://github.com/rwbutler/Hyperconnectivity.git
        exactVersion: 1.2.0
    MarqueeLabel:
        url: https://github.com/cbpowell/MarqueeLabel.git
        exactVersion: 4.5.3
    OTPKit:
        url: https://github.com/OneBusAway/otpkit.git
        minVersion: 0.5.0
        maxVersion: 1.0.0
    SwiftProtobuf:
        url: https://github.com/apple/swift-protobuf.git
        minorVersion: 1.32.0
