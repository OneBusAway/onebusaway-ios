targets:
  OBAKitCore:
    type: framework
    platform: iOS
    sources: ["."]
    dependencies:
      - package: SwiftProtobuf
      - package: GRDB
    scheme:
      gatherCoverageData: true
    info:
      path: "Info.plist"
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: true
        # Swift 6 migration Phase 1 (docs/swift6-migration-plan.md). Stays on
        # permanently: two of its features are not part of the Swift 6 mode.
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_VERSION: "6.0"
